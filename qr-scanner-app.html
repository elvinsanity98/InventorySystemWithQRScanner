<style>
  :root{--bg:#07070f;--surface:#0f0f1a;--card:#151522;--border:#232336;--accent:#5b7cfa;--accent2:#7c3aed;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--text:#e8e8f2;--muted:#5a5a78}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
  .app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;position:relative;overflow:hidden}
  .topbar{background:rgba(10,10,20,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50}
  .topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem}
  .topbar-logo span{color:var(--accent)}
  .cam-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px;gap:2px}
  .cam-btn{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.75rem;padding:4px 12px;border-radius:16px;cursor:pointer;transition:all .2s;font-weight:500}
  .cam-btn.active{background:var(--accent);color:white}
  .content{flex:1;overflow:hidden;display:flex;flex-direction:column}
  .view{display:none;flex-direction:column;height:100%}
  .view.active{display:flex}
  .camera-wrap{position:relative;background:#000;flex-shrink:0;height:300px;overflow:hidden}
  #qr-video{width:100%;height:100%;object-fit:cover;display:none}
  .cam-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:var(--surface)}
  .cam-placeholder p{font-size:.82rem;color:var(--muted);text-align:center;padding:0 20px;line-height:1.5}
  .start-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:white;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;padding:11px 26px;border-radius:12px;cursor:pointer;margin-top:6px}
  .stop-btn{background:var(--surface);border:1px solid var(--red);color:var(--red);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;padding:6px 14px;border-radius:8px;cursor:pointer;position:absolute;top:10px;right:10px;z-index:10}
  .scan-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none}
  .scan-overlay.show{display:flex}
