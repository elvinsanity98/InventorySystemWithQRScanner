<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Inventory System — Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3d;--accent:#4f6ef7;--accent2:#7c3aed;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--text:#e8e8f0;--muted:#6b6b8a;--tag-bg:#1e1e2e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
  header{background:linear-gradient(135deg,#0d0d1a,#131320);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.4)}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:20px;height:20px;fill:white}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem}
  .logo-text span{color:var(--accent)}
  nav{display:flex;gap:4px}
  nav button{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;padding:6px 16px;border-radius:6px;cursor:pointer;transition:all .2s;font-weight:500}
  nav button:hover{color:var(--text);background:var(--card)}
  nav button.active{color:var(--accent);background:rgba(79,110,247,.12)}
  .header-stats{display:flex;gap:20px}
  .stat-pill{background:var(--tag-bg);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:.78rem;display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace}
  .stat-pill .dot{width:6px;height:6px;border-radius:50%}
  .tab-panel{display:none}.tab-panel.active{display:block}
  .dashboard{padding:2rem;max-width:1400px;margin:0 auto}
  .page-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:.3rem}
  .page-sub{color:var(--muted);font-size:.88rem;margin-bottom:2rem}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
  .kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.4rem;position:relative;overflow:hidden}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--accent))}
  .kpi-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
  .kpi-value{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800}
  .kpi-sub{font-size:.78rem;color:var(--muted);margin-top:.3rem}
  .table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
